name        : Build wheel
description : Runs `maturin-action` and uploads the resulting artifact. Caller must check out the repo and rewrite the README before invoking this composite.

inputs:
  command:
    description : maturin subcommand (`build` or `sdist`)
    required    : true

  args:
    default     : ''
    description : Additional flags passed to maturin
    required    : false

  manylinux:
    default     : ''
    description : Manylinux compatibility tag (`auto` on Linux, empty elsewhere)
    required    : false

  name:
    default     : sdist
    description : Tag suffix in the uploaded `wheels-{name}` artifact.

  target:
    default     : ''
    description : Cargo target triple (Linux/macOS/Windows wheel rows). Empty for sdist.
    required    : false

runs:
  using: composite

  steps:
    - name : Restore Cargo cache
      uses : Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4
      with : { cache-on-failure: 'true' }

    - name : Run maturin
      uses : PyO3/maturin-action@3e2bdf6ba6453a61e649744019b8a2d906c7eb38
      with:
        args      : ${{ inputs.args }}
        command   : ${{ inputs.command }}
        manylinux : ${{ inputs.manylinux }}
        sccache   : ${{ github.ref_type != 'tag' }}
        target    : ${{ inputs.target }}

    - name : Upload artifact
      uses : actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
      with:
        if-no-files-found : error
        name              : wheels-${{ inputs.name }}
        path              : target/wheels/*
        retention-days    : 7

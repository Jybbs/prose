name        : Build wheel
description : Provisions cargo via the shared `provision-cargo` action, runs `maturin-action`, and uploads the resulting artifact. Cache scope is keyed by `name`, so `warm.yml` populating `prose-wheel-<name>` on main pushes warms subsequent PR and tag runs that build the same target. Caller must check out the repo and rewrite the README before invoking this composite.

inputs:
  command:
    description : maturin subcommand (`build` or `sdist`)
    required    : true

  args:
    default     : ''
    description : Additional flags passed to maturin
    required    : false

  manylinux:
    default     : ''
    description : Manylinux compatibility tag (`auto` on Linux, empty elsewhere)
    required    : false

  name:
    default     : sdist
    description : Tag suffix in the uploaded `wheels-{name}` artifact and the `provision-cargo` shared-key scope.

  target:
    default     : ''
    description : Cargo target triple (Linux/macOS/Windows wheel rows). Empty for sdist.
    required    : false

runs:
  using: composite

  steps:
    - name : Provision cargo
      uses : ./.github/actions/provision-cargo
      with:
        save-cache : ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        shared-key : prose-wheel-${{ inputs.name }}

    - name  : Dump diagnostic env
      shell : bash
      run   : |
        echo "=== pre-maturin env ==="
        env | sort
        echo
        echo "=== rustc --version --verbose ==="
        rustc --version --verbose || echo "(rustc not on PATH)"
        echo
        echo "=== cargo --version --verbose ==="
        cargo --version --verbose || echo "(cargo not on PATH)"
        echo
        echo "=== sccache --version ==="
        sccache --version 2>/dev/null || echo "(sccache not on PATH yet)"
        echo
        echo "=== PATH ==="
        echo "$PATH" | tr ':' '\n'
        echo
        echo "=== cargo config.toml ==="
        if [ -n "${CARGO_HOME:-}" ] && [ -f "${CARGO_HOME}/config.toml" ]; then
          cat "${CARGO_HOME}/config.toml"
        elif [ -f "$HOME/.cargo/config.toml" ]; then
          cat "$HOME/.cargo/config.toml"
        else
          echo "(no cargo config.toml found)"
        fi
        echo
        echo "=== mise env ==="
        mise env 2>/dev/null || echo "(mise env unavailable)"

    - name : Run maturin
      uses : PyO3/maturin-action@3e2bdf6ba6453a61e649744019b8a2d906c7eb38
      with:
        args      : ${{ inputs.args }}
        command   : ${{ inputs.command }}
        manylinux : ${{ inputs.manylinux }}
        sccache   : ${{ github.ref_type != 'tag' }}
        target    : ${{ inputs.target }}

    - name : Upload artifact
      uses : actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
      with:
        if-no-files-found : error
        name              : wheels-${{ inputs.name }}
        path              : target/wheels/*
        retention-days    : 7

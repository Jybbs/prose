name     : 🪻 CI
run-name : 🪻 CI · ${{ github.head_ref || github.ref_name }}

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  cancel-in-progress : ${{ github.event_name == 'pull_request' }}
  group              : ${{ github.workflow }}-${{ github.head_ref || github.ref }}

permissions:
  contents: read

jobs:
  check:
    name : ${{ matrix.name }}
    uses : ./.github/workflows/check.yml
    strategy:
      fail-fast: false
      matrix:
        include:
          - command    : cargo fmt --all --check
            name       : 🪶 Format
            shared-key : prose-fmt
          - command    : cargo machete
            name       : 🪓 Unused
            shared-key : prose-audit
          - command    : cargo clippy --all-targets --locked -- -D warnings
            name       : 📎 Clippy
            shared-key : prose-build
          - command    : cargo build --all-targets --locked
            name       : 🗜️ Build
            shared-key : prose-build
          - command    : cargo test --locked
            name       : ⚖️ Test
            shared-key : prose-build
    with:
      command    : ${{ matrix.command }}
      save-cache : ${{ github.event_name == 'push' }}
      shared-key : ${{ matrix.shared-key }}

  gate:
    name    : 🗞️ CI Brief
    needs   : check
    if      : always()
    runs-on : ubuntu-latest
    steps:
      - name: Check out repository
        uses: ./.github/actions/checkout-prose
      - name: Provision uv
        uses: ./.github/actions/provision-uv

      - name: Summarize and gate
        env:
          RESULT : ${{ needs.check.result }}
        run: ./.github/scripts/summary.py ci

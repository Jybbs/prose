name        : 🪻 CI
run-name    : 🪻 CI · ${{ github.head_ref || github.ref_name }}
permissions : { contents: read }

on:
  pull_request:
    paths-ignore:
      - '**.md'
      - LICENSE
      - assets/**

  workflow_dispatch:

concurrency:
  cancel-in-progress : ${{ github.event_name == 'pull_request' }}
  group              : ${{ github.workflow }}-${{ github.head_ref || github.ref }}

env:
  CARGO_PROFILE_DEV_DEBUG : line-tables-only
  CARGO_TERM_COLOR        : always

jobs:
  check:
    name    : ${{ matrix.name }}
    runs-on : ubuntu-latest

    env:
      CODECOV_TOKEN : ${{ secrets.CODECOV_TOKEN }}
      SHA           : ${{ github.event.pull_request.head.sha || github.sha }}

    strategy:
      fail-fast: false

      matrix:
        include:
          - cache      : false
            command    : mise run check
            name       : 🪶 Format
          - cache      : false
            command    : mise run lockfile
            name       : 🪵 Lockfile
          - cache      : false
            command    : ./.github/scripts/audit-parity.py
            name       : 🪷 Parity
          - cache      : false
            command    : mise run audit
            name       : 🪓 Unused
          - command    : mise run lint
            name       : 📎 Clippy
            shared-key : prose-clippy
          - command    : mise run build
            name       : 🗜️ Build
            shared-key : prose-build
          - command    : mise run test
            name       : ⚖️ Test
            shared-key : prose-test
          - command    : mise run upload
            name       : ☂️ Coverage
            shared-key : prose-coverage

    steps:
      - name : Check out repository
        uses : actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name : Provision cargo
        uses : ./.github/actions/provision-cargo
        with:
          cache      : ${{ matrix.cache }}
          shared-key : ${{ matrix.shared-key }}

      - name : ${{ matrix.command }}
        run  : ${{ matrix.command }}

  gate:
    name    : 🗞️ Brief
    if      : always()
    needs   : check
    runs-on : ubuntu-latest

    steps:
      - name : Check out repository
        uses : actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name : Provision uv
        uses : ./.github/actions/provision-uv

      - name : Summarize and gate
        env:
          CHECK : ${{ needs.check.result }}
          REF   : ${{ github.head_ref || github.ref_name }}
          SHA   : ${{ github.event.pull_request.head.sha || github.sha }}
        run  : ./.github/scripts/summary.py ci

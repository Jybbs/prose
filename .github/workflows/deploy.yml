name        : 🪻 Deploy
run-name    : 🪻 Deploy · ${{ github.head_ref || github.ref_name }}
permissions : { contents: read }

on:
  pull_request:
    paths: &paths
      - .github/actions/provision-bun/**
      - .github/actions/provision-cargo/**
      - .github/workflows/deploy.yml
      - .mise/tasks/**
      - crate/Cargo.toml
      - 'site/**'

  push:
    branches: [main]
    paths: *paths

concurrency:
  cancel-in-progress : ${{ github.event_name == 'pull_request' }}
  group              : ${{ github.workflow }}-${{ github.head_ref || github.ref }}

jobs:
  checks:
    name    : ${{ matrix.name }}
    runs-on : &ubuntu ubuntu-latest

    strategy:
      fail-fast: false

      matrix:
        include:
          - command : mise run links
            name    : 🗜️ Build
          - command : mise run typecheck
            name    : 🪡 Typecheck

    steps:
      - &checkout
        name : Check out repository
        uses : actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name : Provision Cargo
        uses : ./.github/actions/provision-cargo
        with : { save: false, shared-key: prose-build }

      - &build-prose
        name : Build the prose binary
        run  : mise run build bin

      - &provision-bun
        name : Provision bun
        uses : ./.github/actions/provision-bun

      - name : ${{ matrix.command }}
        run  : ${{ matrix.command }}

  deploy:
    name        : 🪁 Deploy
    if          : ${{ github.event_name == 'push' }}
    needs       : checks
    outputs     : { url: "${{ steps.publish.outputs.deployment-url }}" }
    permissions : { contents: read, deployments: write }
    runs-on     : *ubuntu

    steps:
      - *checkout

      - name : Provision Cargo
        uses : ./.github/actions/provision-cargo
        with : { cache: false }

      - *build-prose
      - *provision-bun

      - name : Build the site
        run  : mise run press

      - name : Deploy to Cloudflare Pages
        id   : publish
        uses : cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0
        with:
          accountId : ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          apiToken  : ${{ secrets.CLOUDFLARE_TOKEN }}
          command   : pages deploy site/dist --project-name=prose --branch=${{ github.head_ref || github.ref_name }} --commit-dirty=true

  gate:
    name    : 🗞️ Brief
    if      : always()
    needs   : checks
    runs-on : *ubuntu

    steps:
      - *checkout

      - name : Provision uv
        uses : ./.github/actions/provision-uv

      - name : Summarize and gate
        env:
          CHECK : ${{ needs.checks.result }}
          REF   : ${{ github.head_ref || github.ref_name }}
          SHA   : ${{ github.event.pull_request.head.sha || github.sha }}
        run  : ./.github/scripts/summary.py docs

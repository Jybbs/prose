name        : 🪻 Release
run-name    : 🪻 Release · ${{ github.head_ref || github.ref_name }}
permissions : { contents: read }

on:
  pull_request:
    paths:
      - crate/pyproject.toml
      - crate/Cargo.toml
      - .github/workflows/release.yml

  push:
    tags: ['[0-9]*']

concurrency:
  cancel-in-progress : ${{ github.event_name == 'pull_request' }}
  group              : ${{ github.workflow }}-${{ github.head_ref || github.ref }}

jobs:
  plan:
    name            : 🗺️ Plan
    outputs         : { matrix: "${{ steps.matrix.outputs.matrix }}" }
    runs-on         : &ubuntu ubuntu-latest
    timeout-minutes : 5

    steps:
      - &checkout
        name : Check out repository
        uses : actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - &provision-uv
        name : Provision uv
        uses : ./.github/actions/provision-uv

      - name : Emit build matrix
        id   : matrix
        run  : ./.github/scripts/emit-matrix.py

      - name : Parse tag and validate versions
        run  : ./.github/scripts/parse-version.py

  build:
    name            : 🎻 ${{ matrix.name }}
    needs           : plan
    runs-on         : ${{ matrix.runner }}
    timeout-minutes : 30

    strategy:
      fail-fast : false
      matrix    : ${{ fromJSON(needs.plan.outputs.matrix) }}

    steps:
      - *checkout

      - *provision-uv

      - &rewrite-readme
        name : Rewrite README for PyPI
        run  : ./.github/scripts/transform_readme.py

      - name : Build wheel
        uses : ./.github/actions/build-wheel
        with:
          args      : --release --locked
          command   : build
          manylinux : ${{ matrix.manylinux }}
          name      : ${{ matrix.name }}
          target    : ${{ matrix.target }}

  sdist:
    name            : 🚢 sdist
    needs           : plan
    runs-on         : *ubuntu
    timeout-minutes : 10

    steps:
      - *checkout

      - *provision-uv

      - *rewrite-readme

      - name : Build sdist
        uses : ./.github/actions/build-wheel
        with : { command: sdist }

  validate:
    name            : 🕯️ Validate
    needs           : [build, sdist]
    runs-on         : *ubuntu
    timeout-minutes : 10

    steps:
      - *checkout

      - &download-dist
        name : Download all artifacts
        uses : ./.github/actions/download-dist

      - &provision-uv-nocache
        name : Provision uv
        uses : ./.github/actions/provision-uv
        with : { cache-dependency-glob: "" }

      - name : Smoke-install built wheel
        run  : |
          uv tool install --no-index --find-links=dist prose-formatter
          prose --version

  publish:
    name            : 📯 Publish to PyPI
    if              : github.ref_type == 'tag'
    needs           : validate
    permissions     : { attestations: write, id-token: write }
    runs-on         : *ubuntu
    timeout-minutes : 10

    environment:
      name : release
      url  : https://pypi.org/p/prose-formatter

    steps:
      - *checkout

      - *download-dist

      - *provision-uv-nocache

      - name : Attest SLSA provenance to GitHub
        uses : actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26
        with : { subject-path: "dist/*" }

      - name : Attest PEP 740 provenance to PyPI
        uses : astral-sh/attest-action@f589a42a7efb6fe400b4f400de60b4bc90390027

      - name : Publish to PyPI
        run  : uv publish --trusted-publishing=always dist/*

  gate:
    name            : 🗞️ Brief
    if              : always()
    needs           : [build, sdist, validate, publish]
    runs-on         : *ubuntu
    timeout-minutes : 5

    steps:
      - *checkout

      - name : Download all artifacts
        if   : needs.build.result != 'cancelled' && needs.sdist.result != 'cancelled'
        uses : ./.github/actions/download-dist

      - *provision-uv

      - name : Write release summary
        env:
          BUILD    : ${{ needs.build.result }}
          PUBLISH  : ${{ needs.publish.result }}
          REF      : ${{ github.head_ref || github.ref_name }}
          SDIST    : ${{ needs.sdist.result }}
          SHA      : ${{ github.event.pull_request.head.sha || github.sha }}
          VALIDATE : ${{ needs.validate.result }}
        run  : ./.github/scripts/summary.py release

name        : 🪻 Warm
run-name    : 🪻 Warm · ${{ github.head_ref || github.ref_name }}
permissions : { contents: read }

on:
  push:
    branches:
      - main
    paths:
      - Cargo.toml
      - Cargo.lock
      - mise.toml
      - .github/actions/provision-cargo/**
      - .github/scripts/platforms.toml
      - .github/workflows/warm.yml

  workflow_dispatch:

concurrency:
  cancel-in-progress : false
  group              : ${{ github.workflow }}

jobs:
  plan:
    name            : 🗺️ Plan
    outputs         : { matrix: "${{ steps.matrix.outputs.matrix }}" }
    runs-on         : ubuntu-latest
    timeout-minutes : 5

    steps:
      - name : Check out repository
        uses : actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name : Provision uv
        uses : ./.github/actions/provision-uv

      - name : Emit build matrix
        id   : matrix
        run  : ./.github/scripts/emit-matrix.py

  checks:
    name    : ${{ matrix.name }}
    runs-on : ubuntu-latest

    env:
      CODECOV_TOKEN : ${{ secrets.CODECOV_TOKEN }}
      SHA           : ${{ github.sha }}

    strategy:
      fail-fast: false

      matrix:
        include:
          - command    : mise run lint
            name       : 📎 Clippy
            shared-key : prose-clippy
          - command    : mise run build
            name       : 🗜️ Build
            shared-key : prose-build
          - command    : mise run test
            name       : ⚖️ Test
            shared-key : prose-test
          - command    : mise run upload
            name       : ☂️ Coverage
            shared-key : prose-coverage

    steps:
      - name : Check out repository
        uses : actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name : Provision cargo
        uses : ./.github/actions/provision-cargo
        with : { shared-key: "${{ matrix.shared-key }}" }

      - name : ${{ matrix.command }}
        run  : ${{ matrix.command }}

  wheels:
    name            : 🔥 ${{ matrix.name }}
    needs           : plan
    runs-on         : ${{ matrix.runner }}
    timeout-minutes : 20

    strategy:
      fail-fast : false
      matrix    : ${{ fromJSON(needs.plan.outputs.matrix) }}

    steps:
      - name : Check out repository
        uses : actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name : Provision cargo
        uses : ./.github/actions/provision-cargo
        with : { shared-key: "prose-wheel-${{ matrix.name }}" }

      - name : Build release artifacts for ${{ matrix.target }}
        run  : mise exec -- cargo build --release --locked --target ${{ matrix.target }}

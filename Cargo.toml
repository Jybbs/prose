[package]
categories   = ["development-tools"]
description  = "A Python typesetter for the reader."
edition      = "2021"
keywords     = ["formatter", "linter", "python", "style"]
license      = "MIT"
name         = "prose"
readme       = "README.md"
repository   = "https://github.com/Jybbs/prose"
rust-version = "1.80"
version      = "0.1.0-dev"

[dependencies]
ruff_python_ast     = "0.0.5"
ruff_python_codegen = "0.0.5"
ruff_python_parser  = "0.0.5"

anyhow    = "1.0"
clap      = { version = "4.5", features = ["derive"] }
serde     = { version = "1.0", features = ["derive"] }
thiserror = "2.0"
toml      = "0.8"

[dev-dependencies]
insta = { version = "1.39", features = ["yaml"] }

[profile.release]
codegen-units = 1
lto           = "thin"
strip         = "symbols"

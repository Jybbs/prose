[package]
categories   = ["development-tools"]
description  = "A Python typesetter for the reader."
edition      = "2021"
keywords     = ["formatter", "linter", "python", "style"]
license      = "MIT"
name         = "prose"
readme       = "README.md"
repository   = "https://github.com/Jybbs/prose"
rust-version = "1.80"
version      = "0.1.0-dev"

[dependencies]
anyhow             = "1.0"
clap               = { version = "4.5", features = ["derive"] }
fs-err             = "3"
ruff_python_ast    = { git = "https://github.com/astral-sh/ruff", tag = "0.15.10", features = ["serde"] }
ruff_python_parser = { git = "https://github.com/astral-sh/ruff", tag = "0.15.10" }
ruff_source_file   = { git = "https://github.com/astral-sh/ruff", tag = "0.15.10" }
ruff_text_size     = { git = "https://github.com/astral-sh/ruff", tag = "0.15.10" }
serde              = { version = "1.0", features = ["derive"] }
serde_ignored      = "0.1"
thiserror          = "2.0"
toml               = "0.8"

[dev-dependencies]
indoc    = "2"
insta    = { version = "1.39", features = ["glob", "yaml"] }
tempfile = "3"

[profile.release]
codegen-units = 1
lto           = "thin"
strip         = "symbols"

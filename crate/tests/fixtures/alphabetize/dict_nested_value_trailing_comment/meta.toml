[docs]
previewable = false
title       = "A Nested Block Value Keeps Its Trailing Comment"

description = '''
A keyed entry whose value is a multi-line dict reorders its inner keys while its trailing `#` comment stays attached, with the separator `,` landing after the closing `}` rather than inside the comment. As the dict's lone multi-line entry, it takes no blank divider and sits line-adjacent to the scalar above it.
'''

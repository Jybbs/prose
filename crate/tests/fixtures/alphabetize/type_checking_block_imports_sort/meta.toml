title       = "`if TYPE_CHECKING` Blocks Sort Their Imports"

description = '''
`from`-import runs inside `if TYPE_CHECKING` blocks **alphabetize as they do at module level**. The compound-statement recursion threads the enclosing scope into each sub-body, so module-scope reorders fire inside `if`, `for`, `while`, `with`, `try`, and `match` arms.

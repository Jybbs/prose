code-line-length            = 100
docstring-line-length       = 60
docstring-structured-policy = "docstring-line-length"
import-line-length          = 99
target-version              = "3.14"

[cache]
enabled      = false
max-size-mib = 250

[rules]
align-colons          = false
align-equals          = false
align-imports         = false
alphabetize           = { enabled = false, group-methods = false, sort-definitions = false, sort-docstring-entries = false, sort-dunder-lists = false }
bare-imports          = { allow = ["scipy", "torch"], enabled = false, exempt-aliased = false, max-attributes = 2 }
blank-lines           = false
call-layout           = { enabled = false, max-inline-args = 6 }
collection-layout     = { collapse = false, enabled = false, explode = false, max-atomics-per-line = 3, max-inline-dict-entries = 5, wrap-dict-entries = false }
import-layout         = false
legacy-union-syntax   = false
reassigned-constants       = { allow = ["LOG_LEVEL"], enabled = false }
align-match-case      = false
docstring-frame       = false
docstring-expand      = false
step-narration        = false
signature-layout      = { enabled = false, max-inline-params = false }
single-use-variables  = { allow-pattern = "^tmp_", enabled = false }
strip-align-padding   = false
strip-trailing-commas = false
align-comparisons     = false
docstring-wrap        = false
unused-future-annotations = false
unsorted-parameters       = false
strip-none-return         = false
signature-annotations     = false

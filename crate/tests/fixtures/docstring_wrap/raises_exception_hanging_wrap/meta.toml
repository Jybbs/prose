previewable = false
title       = "Raises Entries Wrap the Description, Exception Name Stays Flush"

description = '''
A `Raises:` entry naming an exception type **wraps the description at the docstring budget with a hanging indent at the description's start column**, keeping the exception name flush at the parameter-list indent. Both the `ValueError` and `IOError` entries here run past the budget and wrap.
'''

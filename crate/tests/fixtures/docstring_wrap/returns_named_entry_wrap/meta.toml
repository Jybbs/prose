[docs]
previewable = false
title       = "Named Returns Entries Wrap Like Args Entries"

description = '''
A long `Returns:` entry in the `name: description` shape **wraps at the docstring budget with a hanging indent at the description column**, matching the `Args:` entry shape for named-tuple-style return docs. Both the `record` and `cached` entries here run past the budget and wrap.
'''

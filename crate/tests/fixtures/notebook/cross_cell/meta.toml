title       = "Reorder Within a Cell, Never Across One"

description = '''
Two cells each open with an import, and **the sibling-reordering rules run cell-aware so neither cell's import migrates across the boundary**. The second cell's `a = b + 1` reads `b` from the first, and the per-cell reorder keeps that reference after its referent.
'''

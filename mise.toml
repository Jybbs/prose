# ============================================================================
# Project tool environment
# ============================================================================

[tools]
"aqua:taiki-e/cargo-llvm-cov" = "latest"
maturin                       = "latest"
python                        = "3.14"
rust                          = { version = "stable", components = "llvm-tools-preview" }
uv                            = "latest"

[settings]
python.uv_venv_auto = "create|source"

# ============================================================================
# Tasks
# ============================================================================

[tasks.audit]
description = "Detect unused dependencies in `Cargo.toml`"
tools       = { "github:bnjbvr/cargo-machete" = "latest" }
run         = "cargo machete"

[tasks.build]
description = "Build the `prose` binary in debug mode"
run         = "cargo build"

[tasks.check]
description = "Verify Rust source matches `rustfmt` without rewriting"
run         = "cargo fmt --all --check"

[tasks.ci]
depends     = ["audit", "check", "lint", "test", "wheel"]
description = "Full local CI: `audit`, `check`, `lint`, `test`, `wheel`"

[tasks.format]
description = "Format Rust source with `rustfmt`"
run         = "cargo fmt --all"

[tasks.lint]
description = "Run `clippy` with all warnings treated as errors"
run         = "cargo clippy --all-targets -- -D warnings"

[tasks.readme]
description = "Rewrite `README.md` in place to absolute URLs for PyPI"
run         = "./.github/scripts/transform_readme.py"

[tasks.review]
description = "Interactively review pending snapshot diffs"
tools       = { cargo-insta = "latest" }
run         = "cargo insta review"

[tasks.test]
description = "Run all tests including `insta` snapshots"
run         = "cargo test"

[tasks.wheel]
description = "Build the `maturin` wheel into the active virtualenv"
run         = "maturin develop"

title       = "Variadic Prefixes Count Toward the Aligned Width"

description = '''
A signature annotates `*args` and `**kwargs` beside named parameters, where the `*` and `**` prefixes count toward each variadic's display width. **The widest member `event_name` sets the `:` column**, and the variadic and named parameters alike pad to reach it.
'''

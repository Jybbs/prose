title       = "All Six Comparison Operators Right-Align in One Group"

description = '''
All six comparison operators, `==`, `!=`, `<`, `<=`, `>`, and `>=`, align in one group with **right-alignment**. Each operator's last character sits in the shared column, so the single-character `<` and `>` indent further than the two-character forms.
'''

previewable = false
title       = "An Annotated Field Reading an Earlier Field Keeps Producer Order"

description = '''
`total` reads `width` in its default, so the field run **keeps the producer ahead of the consumer** rather than alphabetizing `total` above `width`. The tiering preserves the definition order a class body evaluates top to bottom, where a tier-blind sort would raise `NameError`.
'''

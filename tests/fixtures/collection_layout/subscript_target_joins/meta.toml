[docs]
previewable = false
title       = "Multi-Line Subscripts Join onto One Line"

description = '''
A multi-line subscript joins its `value[index]` onto one line whatever the index shape, a name, a tuple `data[a, b]`, or a slice `data[a:b]`, so an augmented-assignment target then normalizes its operator and a collapsed value still aligns. The join measures the subscript **from its own column**, leaving a subscript that would overflow once joined on its source lines.
'''

title       = "Aligned Constants Carry the Loose-Constants Lint Past Padding"

description = '''
Untyped module constants of varied widths widen onto a shared `=` column under `align-equals`, while `loose-constants` flags only the reassigned `RATE_LIMIT` and leaves the write-once neighbors silent. **The diagnostic range tracks the post-align statement positions** rather than the source offsets.
'''

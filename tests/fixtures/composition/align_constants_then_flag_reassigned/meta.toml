previewable = true
title       = "Aligned Constants Carry the Reassigned-Constants Lint Past Padding"

description = '''
Untyped module constants of varied widths widen onto a shared `=` column under `align-equals`, while `reassigned-constants` flags `RATE_LIMIT` alone, the one name rebound after its first write, and leaves the write-once neighbors silent. **The diagnostic range tracks the source offsets** rather than the post-align statement positions.
'''

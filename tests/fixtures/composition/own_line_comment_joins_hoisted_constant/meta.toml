description = '''
`alphabetize` and `blank-lines` agree on where the own-line comment belongs. The comment forward-attaches to `MAX_WORKERS`, so banding hoists the pair above `configure` **on the first pass** rather than relocating the block only after a second format settles the blank-line texture.

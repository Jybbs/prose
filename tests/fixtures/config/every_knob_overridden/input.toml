code-line-length            = 100
docstring-line-length       = 60
docstring-structured-policy = "docstring-line-length"
target-version              = "3.14"

[cache]
enabled      = false
max-size-mib = 250

[rules]
align-colons              = false
align-equals              = false
align-imports             = false
alphabetize               = { docstring-entries = false, enabled = false }
bare-import-allowlist     = { allow = ["scipy", "torch"], enabled = false }
blank-lines               = false
collection-layout         = { enabled = false, max-atomics-per-line = 3 }
legacy-union-syntax       = false
loose-constants           = { allow = ["LOG_LEVEL"], enabled = false }
match-case-align          = false
multi-line-docstrings     = false
no-single-line-docstrings = false
no-step-narration         = false
signature-layout          = { enabled = false, max-inline-params = false }
single-use-variables      = { allow-pattern = "^tmp_", enabled = false }
singleton-rule            = false
strip-trailing-commas     = false

[tool.prose]
code-line-length = 100
docstring-line-length = 60
docstring-structured-policy = "docstring-line-length"
target-version = "3.14"

[tool.prose.rules.align-colons]
enabled = false

[tool.prose.rules.align-equals]
enabled = false

[tool.prose.rules.align-imports]
enabled = false

[tool.prose.rules.alphabetize]
enabled = false

[tool.prose.rules.blank-lines]
enabled = false

[tool.prose.rules.collection-layout]
enabled = false
max-atomics-per-line = 3

[tool.prose.rules.match-case-align]
enabled = false

[tool.prose.rules.multi-line-docstrings]
enabled = false

[tool.prose.rules.no-single-line-docstrings]
enabled = false

[tool.prose.rules.singleton-rule]
enabled = false

[tool.prose.rules.strip-trailing-commas]
enabled = false

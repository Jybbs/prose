description = '''
A function carrying a long-form docstring with `Args:` and `Returns:` sections meets a typed parameter list of varying widths. **The full pipeline lifts the docstring opener and closer onto their own lines, wraps the prose paragraph at the budget, holds the parameters in source order, and aligns the signature `:` columns.**
